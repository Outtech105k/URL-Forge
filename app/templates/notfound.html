<!DOCTYPE html>
<html lang="ja">

<head>
    {{template "_head.html" .}}
    <title>404 Not Found - URL Forge</title>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .error-box {
            max-width: 600px;
            margin: 15vh auto;
            padding: 2rem;
        }
    </style>
</head>

<body>
    <div class="container text-center">
        <div class="card shadow error-box">
            <div class="card-body">
                <div class="mb-4">
                    <img src="{{.ServerEndpoint}}/static/images/logo.png" alt="Logo" style="height: 80px;" class="rounded">
                </div>
                <h1 class="display-1 text-muted">404</h1>
                <h4 class="card-title mb-3">ページが見つかりません</h4>
                <p class="card-text text-muted">
                    {{ if .Message }}
                    {{ .Message }}
                    {{ else }}
                    指定されたURLは存在しないか、有効期限が切れている可能性があります。<br>
                    URLが正しいか確認してください。
                    {{ end }}
                </p>
                <div class="mt-4">
                    <a href="/" class="btn btn-primary">トップページに戻る</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
