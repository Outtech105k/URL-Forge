<!DOCTYPE html>
<html lang="ja">

<head>
    {{template "_head.html" .}}
    <title>カスタムURL生成 - URL Forge</title>

    <!-- OGP Tags -->
    <meta property="og:title" content="URL生成 - URL Forge" />
    <meta property="og:description" content="既存のサイトにアクセスできる、カスタムURLを作成できます。" />
    <meta property="og:url" content="{{.ServerEndpoint}}" />

    <style>
        ::placeholder {
            color: #ccc !important;
            opacity: 0.7;
        }

        .bi-info-circle {
            cursor: help;
            font-size: 0.9rem;
            vertical-align: middle;
        }
    </style>
</head>

<body class="p-4">
    <div class="container">
        <div class="d-flex align-items-center mb-4">
            <img src="{{.ServerEndpoint}}/static/images/logo.png" alt="Logo" style="height: 80px;" class="me-3 rounded">
            <h2 class="mb-0">カスタムURL生成</h2>
        </div>
        <form id="urlForm" class="row g-3">
            <div class="col-12">
                <label class="form-label">元URL</label>
                <input type="url" class="form-control" id="base_url" required placeholder="https://example.com">
            </div>

            <div class="col-12">
                <!-- タブ切替 -->
                <ul class="nav nav-tabs mb-0 bg-light px-1 pt-1 rounded-top" id="modeTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="auto-tab" data-bs-toggle="tab" data-bs-target="#auto"
                            type="button" role="tab"><i class="bi bi-dice-6"></i> ランダム生成</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="custom-tab" data-bs-toggle="tab" data-bs-target="#custom"
                            type="button" role="tab"><i class="bi bi-pencil-square"></i> カスタムID指定</button>
                    </li>
                </ul>

                <div class="tab-content border-top-0 border rounded-bottom p-1 bg-light" id="modeTabsContent">
                    <!-- ランダム生成入力 -->
                    <div class="tab-pane fade show active" id="auto" role="tabpanel">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="use_uppercase">
                            <label class="form-check-label">英大文字を使用する</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="use_lowercase" checked>
                            <label class="form-check-label">英小文字を使用する</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="use_numbers" checked>
                            <label class="form-check-label">数字を使用する</label>
                        </div>
                        <div class="mt-2">
                            <label class="form-label">IDの長さ</label>
                            <input type="number" class="form-control" id="id_length" value="6" min="1">
                        </div>
                    </div>

                    <!-- カスタムID入力 -->
                    <div class="tab-pane fade" id="custom" role="tabpanel">
                        <div class="mb-3">
                            <label class="form-label">カスタムURLのID</label>
                            <input type="text" class="form-control" id="custom_id">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 有効期限入力 -->
            <div class="col-12 col-md-6">
                <label class="form-label">
                    有効期間
                    <i class="bi bi-info-circle text-muted" data-bs-toggle="tooltip"
                        data-bs-title="空白の場合は無期限になります。"></i>
                </label>
                <input type="number" class="form-control" id="expire_value" min="1" placeholder="例: 10">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label">単位</label>
                <select class="form-select" id="expire_unit">
                    <option value="s">秒</option>
                    <option value="m">分</option>
                    <option value="h" selected>時間</option>
                    <option value="d">日</option>
                </select>
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="sand_cushion_page">
                    <label class="form-check-label">
                        クッションページを挟む
                        <i class="bi bi-info-circle text-muted" data-bs-toggle="tooltip"
                            data-bs-title="SNS等でのプレビューのネタバレが抑制できます。"></i>
                    </label>
                </div>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="public_ctrl" checked>
                    <label class="form-check-label">
                        管理画面を公開する
                        <i class="bi bi-info-circle text-muted" data-bs-toggle="tooltip"
                            data-bs-title="誰でも管理画面（OGP確認等）にアクセスできるようになります。"></i>
                    </label>
                </div>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle"></i> URL生成</button>
            </div>
        </form>

        <div id="result" class="mt-4" style="display: none;">
            <h5>生成されたURL:</h5>
            <div class="input-group mb-3">
                <input type="text" id="short_url" class="form-control" readonly>
                <button class="btn btn-outline-secondary" onclick="copyToClipboard('short_url', this)">
                    <i class="bi bi-copy"></i> Copy
                </button>
                <a id="jump_link" class="btn btn-primary" target="_blank">
                    <i class="bi bi-box-arrow-up-right"></i> Jump
                </a>
            </div>
        </div>
    </div>

    {{template "_scripts.html" .}}
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Initialize tooltips
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));

            const messageMap = {
                // Warnings
                "custom_id contains multibyte characters; behavior may be unstable in some environments.": "カスタムIDにマルチバイト文字が含まれています。一部の環境で動作が不安定になる可能性があります。",
                
                // Errors
                "custom_id is already used.": "そのカスタムIDはすでに使用されています。",
                "custom_id exceeds maximum length": "カスタムIDが長すぎます（最大100文字）。",
                "base_url must be a valid URL": "有効なURLを入力してください。",
                "base_url is required": "元URLを入力してください。",
                "Empty JSON body": "リクエストが空です。",
                "Malformed JSON body": "リクエストの形式が正しくありません。",
                "Invalid JSON input": "入力内容が正しくありません。",
                "No character types available for URL ID.": "URL IDに使用できる文字タイプが選択されていません。",
                "Custom ID generation failed after 10 attempts.": "カスタムIDの自動生成に失敗しました（試行回数超過）。",
                "custom_id: contains `/`, it isn't acceptable.": "カスタムIDに `/` を含めることはできません。",
                "custom_id: `api` is reserved by system, not acceptable.": "`api` はシステム予約語のため、カスタムIDとして使用できません。",
                "custom_id cannot be used together with use_uppercase, use_lowercase, use_numbers, or id_length": "カスタムID指定時は、ランダム生成用の設定（大文字・小文字・数字・長さ）を併用できません。",
                "An unexpected error occurred. Please try again later.": "予期せぬエラーが発生しました。しばらく時間を置いてから再度お試しください。"
            };

            const translate = (msg) => {
                if (!msg) return msg;
                return messageMap[msg] || msg;
            };

            const form = document.getElementById("urlForm");

            form.addEventListener("submit", async function (e) {
                e.preventDefault();

                const activeTab = document.querySelector(".nav-link.active").id;
                const expireValue = document.getElementById("expire_value").value.trim();
                const expireUnit = document.getElementById("expire_unit").value;
                const expire_in = expireValue ? `${expireValue}${expireUnit}` : null;

                const body = {
                    base_url: document.getElementById("base_url").value,
                    expire_in: expire_in,
                    sand_cushion: document.getElementById("sand_cushion_page").checked,
                    public_ctrl: document.getElementById("public_ctrl").checked,
                };

                if (activeTab === "custom-tab") {
                    const customId = document.getElementById("custom_id").value.trim();
                    if (!customId) {
                        showToast("カスタムIDを入力してください。", "warning");
                        return;
                    }
                    body.custom_id = customId;
                } else {
                    body.use_uppercase = document.getElementById("use_uppercase").checked;
                    body.use_lowercase = document.getElementById("use_lowercase").checked;
                    body.use_numbers = document.getElementById("use_numbers").checked;
                    body.id_length = parseInt(document.getElementById("id_length").value);
                }

                try {
                    const res = await fetch("/api/set", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });

                    const data = await res.json();

                    if (res.ok) {
                        document.getElementById("short_url").value = data.short_url;
                        document.getElementById("jump_link").href = data.short_url;
                        document.getElementById("result").style.display = "block";
                        showToast("URLを生成しました！", "success");

                        if (data.warnings && data.warnings.length > 0) {
                            data.warnings.forEach((warning, index) => {
                                setTimeout(() => {
                                    showToast("注意: " + translate(warning), "warning");
                                }, 500 * (index + 1));
                            });
                        }
                    } else {
                        let errorMsg = data.message;
                        
                        // バリデーションエラー(details)がある場合の処理
                        if (data.type === "validation_error" && data.details && data.details.length > 0) {
                            errorMsg = data.details.map(d => translate(d.message)).join("<br>");
                        } else {
                            errorMsg = translate(errorMsg || "不明なエラーが発生しました");
                        }
                        
                        showToast("エラー: " + errorMsg, "danger");
                    }
                } catch (err) {
                    showToast("リクエスト失敗: " + err.message, "danger");
                }
            });
        });
    </script>
</body>

</html>
